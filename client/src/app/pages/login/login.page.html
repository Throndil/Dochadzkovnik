<div class="min-h-screen bg-slate-100 flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center mb-6 text-slate-800">Prihlásenie administrátora</h1>
    @if (error()) {
      <div class="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm">{{ error() }}</div>
    }
    <form (ngSubmit)="onSubmit()" autocomplete="off">
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-1">Používateľské meno</label>
        <input type="text" [(ngModel)]="username" name="username" required autocomplete="off"
               class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500" />
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-slate-700 mb-1">Heslo</label>
        <input type="password" [(ngModel)]="password" name="password" required autocomplete="new-password"
               class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500" />
      </div>
      <button type="submit" [disabled]="loading()"
              class="w-full bg-amber-500 hover:bg-amber-600 text-white font-medium py-2 px-4 rounded-md transition-colors disabled:opacity-50">
        {{ loading() ? 'Prihlasovanie...' : 'Prihlásiť sa' }}
      </button>
    </form>
    <div class="mt-4 text-center space-y-2">
      <div>
        <a routerLink="/forgot-password" class="text-sm text-amber-600 hover:text-amber-800">Zabudli ste heslo?</a>
      </div>
      <div>
        <a href="/kiosk" class="text-sm text-slate-500 hover:text-amber-600">Prejsť na kiosk →</a>
      </div>
    </div>
  </div>
</div>
