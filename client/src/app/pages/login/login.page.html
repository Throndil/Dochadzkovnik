<div class="min-h-screen bg-slate-100 dark:bg-slate-900 flex items-center justify-center p-4 relative">
  <!-- Theme toggle — usable before login, anyone can switch. -->
  <button type="button" (click)="theme.toggleTheme()"
          class="absolute top-4 right-4 p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-slate-500 dark:text-slate-300"
          [title]="theme.isDark() ? 'Prepnúť na svetlý režim' : 'Prepnúť na tmavý režim'">
    @if (theme.isDark()) {
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
      </svg>
    } @else {
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
    }
  </button>
  <div class="bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-lg shadow-md w-full max-w-sm border border-slate-200 dark:border-slate-700">
    <h1 class="text-xl sm:text-2xl font-bold text-center mb-6 text-slate-800 dark:text-white">Prihlásenie Vladimíra Sroku</h1>
    @if (error()) {
      <div class="bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-400 border border-red-200 dark:border-red-700/50 p-3 rounded mb-4 text-sm">{{ error() }}</div>
    }
    <form (ngSubmit)="onSubmit()" autocomplete="off">
      @if (!pinStep()) {
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Používateľské meno</label>
          <input type="text" [(ngModel)]="username" name="username" required autocomplete="off"
                 class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-amber-500" />
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Heslo</label>
          <input type="password" [(ngModel)]="password" name="password" required autocomplete="new-password"
                 class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-amber-500" />
        </div>
      } @else {
        <!-- PIN step — password was correct, the account has a security PIN. -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Bezpečnostný PIN</label>
          <input type="password" [(ngModel)]="pin" name="pin" required autofocus
                 inputmode="numeric" pattern="[0-9]*" maxlength="8" autocomplete="one-time-code"
                 class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-700 text-slate-900 dark:text-white text-center text-xl tracking-[0.5em] focus:outline-none focus:ring-2 focus:ring-amber-500" />
        </div>
      }
      <button type="submit" [disabled]="loading()"
              class="w-full bg-amber-500 hover:bg-amber-600 text-white font-medium py-2 px-4 rounded-md transition-colors disabled:opacity-50">
        {{ loading() ? 'Prihlasovanie...' : (pinStep() ? 'Potvrdiť PIN' : 'Prihlásiť sa') }}
      </button>
      @if (pinStep()) {
        <button type="button" (click)="backToPassword()"
                class="w-full mt-2 text-sm text-slate-500 dark:text-slate-400 hover:text-amber-600 dark:hover:text-amber-400">
          ← Späť na prihlásenie
        </button>
      }
    </form>
    <div class="mt-4 text-center space-y-2">
      <div>
        <a routerLink="/forgot-password" class="text-sm text-amber-600 hover:text-amber-800 dark:hover:text-amber-400">Zabudli ste heslo?</a>
      </div>
      <div>
        <a href="/kiosk" class="text-sm text-slate-500 dark:text-slate-400 hover:text-amber-600 dark:hover:text-amber-400">Prejsť na šichtovnicu →</a>
      </div>
    </div>
  </div>
</div>
