<div class="min-h-screen bg-slate-100 dark:bg-slate-900 flex items-center justify-center">
  <div class="bg-white dark:bg-slate-800 p-8 rounded-lg shadow-md w-full max-w-sm border border-slate-200 dark:border-slate-700">
    <h1 class="text-2xl font-bold text-center mb-6 text-slate-800 dark:text-white">Prihlásenie Vladimíra Sroku</h1>
    @if (error()) {
      <div class="bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-400 border border-red-200 dark:border-red-700/50 p-3 rounded mb-4 text-sm">{{ error() }}</div>
    }
    <form (ngSubmit)="onSubmit()" autocomplete="off">
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Používateľské meno</label>
        <input type="text" [(ngModel)]="username" name="username" required autocomplete="off"
               class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-amber-500" />
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Heslo</label>
        <input type="password" [(ngModel)]="password" name="password" required autocomplete="new-password"
               class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-amber-500" />
      </div>
      <button type="submit" [disabled]="loading()"
              class="w-full bg-amber-500 hover:bg-amber-600 text-white font-medium py-2 px-4 rounded-md transition-colors disabled:opacity-50">
        {{ loading() ? 'Prihlasovanie...' : 'Prihlásiť sa' }}
      </button>
    </form>
    <div class="mt-4 text-center space-y-2">
      <div>
        <a routerLink="/forgot-password" class="text-sm text-amber-600 hover:text-amber-800 dark:hover:text-amber-400">Zabudli ste heslo?</a>
      </div>
      <div>
        <a href="/kiosk" class="text-sm text-slate-500 dark:text-slate-400 hover:text-amber-600 dark:hover:text-amber-400">Prejsť na šichtovnicu →</a>
      </div>
    </div>
  </div>
</div>
