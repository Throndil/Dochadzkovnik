<div class="min-h-screen bg-slate-100 flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center mb-6 text-slate-800">Nové heslo</h1>

    @if (success()) {
      <div class="bg-green-100 text-green-700 p-4 rounded mb-4 text-sm text-center">
        Heslo bolo úspešne zmenené.
      </div>
      <div class="text-center">
        <a routerLink="/login" class="text-amber-600 hover:text-amber-800 text-sm font-medium">Prihlásiť sa →</a>
      </div>
    } @else {
      @if (error()) {
        <div class="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm">{{ error() }}</div>
      }
      <form (ngSubmit)="onSubmit()">
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-700 mb-1">Nové heslo</label>
          <input type="password" [(ngModel)]="newPassword" name="newPassword" required minlength="6"
                 class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500" />
          <p class="text-xs text-slate-400 mt-1">Minimálne 6 znakov</p>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-700 mb-1">Potvrdiť heslo</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required
                 class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500" />
          @if (confirmPassword && newPassword !== confirmPassword) {
            <p class="text-xs text-red-500 mt-1">Heslá sa nezhodujú</p>
          }
        </div>
        <button type="submit" [disabled]="loading() || !valid"
                class="w-full bg-amber-500 hover:bg-amber-600 text-white font-medium py-2 px-4 rounded-md transition-colors disabled:opacity-50">
          {{ loading() ? 'Ukladám...' : 'Nastaviť heslo' }}
        </button>
      </form>
    }
  </div>
</div>
