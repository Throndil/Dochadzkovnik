<app-navbar />
<div class="min-h-screen bg-slate-50 dark:bg-slate-900">
  <div class="max-w-xl mx-auto px-4 py-4 sm:p-6 space-y-6">
    <h1 class="text-xl sm:text-2xl font-bold text-slate-900 dark:text-white">Upraviť vozidlo</h1>

    @if (car()) {
      <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6">
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-2">Fotografia vozidla</label>
          <div class="relative w-full h-48 rounded-lg cursor-pointer overflow-hidden transition-colors border-2"
               [class.border-dashed]="!photoPreview()"
               [class.border-amber-400]="isDragOver()"
               [class.border-slate-600]="!isDragOver()"
               (click)="photoInput.click()"
               (dragover)="onDragOver($event)"
               (dragleave)="onDragLeave()"
               (drop)="onDrop($event)">
            @if (photoPreview()) {
              <img [src]="photoPreview()" class="w-full h-full object-cover" alt="Preview" />
              <div class="absolute inset-0 bg-black/40 opacity-0 hover:opacity-100 flex items-center justify-center transition-opacity">
                <span class="text-slate-900 dark:text-white text-sm text-center px-2">Zmeniť foto</span>
              </div>
            } @else {
              <div class="w-full h-full bg-slate-100 dark:bg-slate-700 flex flex-col items-center justify-center gap-2 transition-colors"
                   [class.bg-amber-900/30]="isDragOver()"
                   [class.text-amber-400]="isDragOver()"
                   [class.text-slate-500]="!isDragOver()">
                <span class="text-4xl">🚗</span>
                <span class="text-sm text-center px-4 leading-tight">
                  {{ isDragOver() ? 'Pustiť sem' : 'Kliknúť alebo pretiahnuť fotografiu vozidla' }}
                </span>
              </div>
            }
            <input #photoInput type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)" />
          </div>
          <p class="text-xs text-slate-500 mt-1">Foto sa uloží pri kliknutí na "Uložiť zmeny"</p>
        </div>

        <form (ngSubmit)="onSave()" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">Názov vozidla</label>
            <input type="text" [(ngModel)]="name" name="name" required
                   class="w-full px-3 py-2 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">ŠPZ <span class="text-slate-500 font-normal">(voliteľné)</span></label>
            <input type="text" [(ngModel)]="licensePlate" name="licensePlate" maxlength="20"
                   class="w-full px-3 py-2 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500" />
          </div>
          <div>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" [(ngModel)]="isActive" name="isActive"
                     class="rounded border-slate-300 dark:border-slate-600 bg-slate-100 dark:bg-slate-700 text-amber-500 focus:ring-amber-500" />
              <span class="text-sm text-slate-600 dark:text-slate-300">Aktívne</span>
            </label>
          </div>
          <div class="flex gap-3 items-center pt-2">
            <button type="submit"
                    class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2 rounded-lg transition-colors">
              Uložiť zmeny
            </button>
            <button type="button" (click)="onBack()"
                    class="bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 px-6 py-2 rounded-lg transition-colors">
              Späť
            </button>
            @if (saved()) {
              <span class="text-green-400 text-sm font-medium">Uložené ✓</span>
            }
          </div>
        </form>
      </div>

      <app-commander-car-panel [licensePlate]="licensePlate" />
    }
  </div>
</div>
