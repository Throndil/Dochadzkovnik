<div class="min-h-screen bg-slate-100 dark:bg-slate-900 flex items-center justify-center p-4">
  <div class="bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-lg shadow-md w-full max-w-sm border border-slate-200 dark:border-slate-700">
    <h1 class="text-xl sm:text-2xl font-bold text-center mb-2 text-slate-800 dark:text-white">Zabudnuté heslo</h1>

    @if (sent()) {
      <div class="bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400 p-4 rounded mb-4 text-sm text-center">
        Ak účet existuje a má nastavený e-mail, odoslali sme odkaz na obnovenie hesla.
      </div>
      <div class="text-center">
        <a routerLink="/login" class="text-amber-600 hover:text-amber-800 dark:hover:text-amber-400 text-sm font-medium">← Späť na prihlásenie</a>
      </div>
    } @else {
      <p class="text-sm text-slate-500 dark:text-slate-400 mb-6 text-center">Pošleme vám e-mail s odkazom na obnovenie hesla.</p>
      <form (ngSubmit)="onSubmit()">
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Prihlasovacie meno</label>
          <input type="text" [(ngModel)]="username" name="username" required autocomplete="off"
                 class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-amber-500" />
        </div>
        <button type="submit" [disabled]="loading() || !username"
                class="w-full bg-amber-500 hover:bg-amber-600 text-white font-medium py-2 px-4 rounded-md transition-colors disabled:opacity-50">
          {{ loading() ? 'Odosielam...' : 'Odoslať odkaz' }}
        </button>
      </form>
      <div class="mt-4 text-center">
        <a routerLink="/login" class="text-sm text-slate-500 dark:text-slate-400 hover:text-amber-600 dark:hover:text-amber-400">← Späť na prihlásenie</a>
      </div>
    }
  </div>
</div>
