<app-navbar />
<div class="max-w-3xl mx-auto px-4 py-4 sm:p-6">
  <h1 class="text-xl sm:text-2xl font-bold text-slate-800 mb-4 sm:mb-6">Upraviť zamestnanca</h1>

  @if (employee()) {
    <div class="bg-white rounded-lg shadow p-6">
      <div class="mb-6">
        <label class="block text-sm font-medium text-slate-700 mb-2">Fotografia</label>
        <div class="relative w-40 h-40 rounded-lg cursor-pointer overflow-hidden transition-colors border-2"
             [class.border-dashed]="!photoPreview()"
             [class.border-amber-400]="isDragOver()"
             [class.border-slate-300]="!isDragOver()"
             (click)="photoInput.click()"
             (dragover)="onDragOver($event)"
             (dragleave)="onDragLeave()"
             (drop)="onDrop($event)">
          @if (photoPreview()) {
            <img [src]="photoPreview()" class="w-full h-full object-cover" alt="Preview" />
            <div class="absolute inset-0 bg-black/40 opacity-0 hover:opacity-100 flex items-center justify-center transition-opacity">
              <span class="text-white text-xs text-center px-2">Zmeniť foto</span>
            </div>
          } @else {
            <div class="w-full h-full flex flex-col items-center justify-center gap-2 transition-colors"
                 [class.bg-amber-50]="isDragOver()"
                 [class.text-amber-500]="isDragOver()"
                 [class.text-slate-400]="!isDragOver()">
              <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <span class="text-xs text-center px-2 leading-tight">
                {{ isDragOver() ? 'Pustiť sem' : 'Kliknúť alebo pretiahnuť' }}
              </span>
            </div>
          }
          <input #photoInput type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)" />
        </div>
      </div>

      <form (ngSubmit)="onSave()" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Meno</label>
            <input type="text" [(ngModel)]="firstName" name="firstName" required
                   class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Priezvisko</label>
            <input type="text" [(ngModel)]="lastName" name="lastName" required
                   class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500" />
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Telefónne číslo</label>
            <input type="tel" [(ngModel)]="phoneNumber" name="phoneNumber" maxlength="30"
                   class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500"
                   placeholder="+421 900 000 000" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Mesto</label>
            <input type="text" [(ngModel)]="city" name="city" maxlength="100"
                   class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Domáca adresa</label>
          <input type="text" [(ngModel)]="address" name="address" maxlength="300"
                 class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500" />
        </div>
        <div>
          <label class="flex items-center gap-2">
            <input type="checkbox" [(ngModel)]="isActive" name="isActive"
                   class="rounded border-slate-300 text-amber-500 focus:ring-amber-500" />
            <span class="text-sm text-slate-700">Aktívny</span>
          </label>
        </div>
        <div class="flex gap-3">
          <button type="submit"
                  class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2 rounded-md transition-colors">
            Uložiť zmeny
          </button>
          <button type="button" (click)="onBack()"
                  class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-6 py-2 rounded-md transition-colors">
            Zrušiť
          </button>
        </div>
      </form>

      <div class="border-t border-slate-200 mt-6 pt-6">
        <h3 class="text-sm font-semibold text-slate-700 mb-3">Zmeniť PIN</h3>
        <div class="flex gap-3 items-center">
          <input type="text" [(ngModel)]="newPin" name="newPin" maxlength="6" pattern="[0-9]{4,6}"
                 placeholder="Nový 4–6 číselný PIN"
                 class="px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500 w-48" />
          <button type="button" (click)="onSetPin()"
                  [disabled]="!pinValid"
                  class="bg-amber-500 hover:bg-amber-600 disabled:opacity-40 text-white px-4 py-2 rounded-md transition-colors">
            Nastaviť PIN
          </button>
          @if (pinSaved) {
            <span class="text-green-600 text-sm font-medium">PIN aktualizovaný ✓</span>
          }
        </div>
      </div>
    </div>
  }
</div>
