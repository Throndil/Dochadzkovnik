<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <title>Sichtovnica</title>
  <base href="/">
  <!-- viewport-fit=cover lets us read env(safe-area-inset-*) on notched / dynamic-island iPhones -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <link rel="icon" type="image/png" href="profistav_logo_192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="Sichtovnica">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- iOS standalone (added-to-home-screen) status bar: default = system style with content under it. -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <!-- Theme colour matches the page background (slate-50 / slate-900). The two
       media-scoped tags below cover the first paint before our JS runs (the OS's
       dark-mode preference). ThemeService later injects a third unscoped
       <meta name="theme-color"> that follows the app's own dark-mode toggle —
       needed because the user can have a light-mode OS and a dark-mode app. -->
  <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <app-root></app-root>
</body>
</html>
